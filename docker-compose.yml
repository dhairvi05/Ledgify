services:
  # 1. Caching & Streaming Queue Layer
  finguard-redis:
    image: redis:alpine
    container_name: finguard-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 2. Relational ACID Financial Ledger
  finguard-postgres:
    image: postgres:alpine
    container_name: finguard-postgres
    environment:
      POSTGRES_USER: finguard_stream
      POSTGRES_PASSWORD: finguard
      POSTGRES_DB: transaction_ledger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  # 3. Document-Store Audit Trail Layer
  finguard-mongodb:
    image: mongo:latest
    container_name: finguard-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: finguard_db
      MONGO_INITDB_ROOT_PASSWORD: finguardstream
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  redis_data:
  postgres_data:
  mongodb_data: